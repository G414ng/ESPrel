<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Inverter Telemetry Dashboard</title>
  <style>
    /* Keeping your exact style, just tweaking the cards */
    body { font-family: Arial, sans-serif; text-align: center; background-color: #f9f9f9; padding-bottom: 40px; }
    h1 { margin-top: 30px; font-size: 1.8rem; }
    .card-container { max-width: 1000px; margin: 20px auto; display: flex; flex-wrap: wrap; justify-content: center; }
    .data-card { background: white; padding: 20px; margin: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 220px; }
    .data-card h2 { margin-bottom: 5px; font-size: 1.1rem; color: #555; }
    .data-card p { font-size: 2rem; margin: 10px 0; font-weight: bold; color: #1e88e5; }
    .unit { font-size: 1rem; color: #888; }
  </style>
</head>
<body>

  <h1>Solar & Inverter Dashboard</h1>
  
  <div class="card-container" id="dashboard">
    <div class="data-card"><h2>Battery Voltage</h2><p><span id="battVolts">--</span> <span class="unit">V</span></p></div>
    <div class="data-card"><h2>PV Voltage</h2><p><span id="pvVolts">--</span> <span class="unit">V</span></p></div>
    <div class="data-card"><h2>PV Power</h2><p><span id="pvPower">--</span> <span class="unit">W</span></p></div>
    <div class="data-card"><h2>Load Power</h2><p><span id="loadPower">--</span> <span class="unit">W</span></p></div>
    <div class="data-card"><h2>Inverter Temp</h2><p><span id="invTemp">--</span> <span class="unit">°C</span></p></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

  <script>
    // 1. Your Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBI4avbS3jlosFI_xxuPhkQ6UQPMiqdxRc",
      authDomain: "esp32relay-c5b1a.firebaseapp.com",
      databaseURL: "https://esp32relay-c5b1a-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "esp32relay-c5b1a",
      storageBucket: "esp32relay-c5b1a.firebasestorage.app",
      messagingSenderId: "687848660895",
      appId: "1:687848660895:web:a0c4e2ef61391536bbe7aa"
    };

    firebase.initializeApp(firebaseConfig);

    const allowedEmail = "abc@gmail.com";
    const allowedPassword = "admin123";

    const loginForm = document.getElementById("loginForm");
    const dashboard = document.getElementById("dashboard");
    const loginBtn = document.getElementById("loginBtn");

    // 2. The Login Button Logic
    loginBtn.addEventListener("click", () => {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if(email === allowedEmail && password === allowedPassword){
        firebase.auth().signInWithEmailAndPassword(email, password)
          .then(userCredential => {
            console.log("Signed in as", userCredential.user.email);
            loginForm.style.display = "none";
            dashboard.style.display = "flex"; // Show the dashboard cards
            startTelemetryMonitor(); // Start fetching data ONLY after login
          })
          .catch(error => {
            alert("Firebase login failed: " + error.message);
          });
      } else {
        alert("Invalid email or password.");
      }
    });

    // 3. The Telemetry Listener (Runs after login)
    function startTelemetryMonitor() {
      const db = firebase.database();
      const inverterRef = db.ref("/inverter");

      console.log("Listening for data on /inverter...");

      inverterRef.on("value", (snapshot) => {
        const data = snapshot.val();
        console.log("New data received:", data); // Prints data to the F12 Console

        if(data) {
          // Add optional chaining/checks so if one value is missing, the page doesn't break
          if(data.batteryVoltage !== undefined) document.getElementById("battVolts").innerText = data.batteryVoltage.toFixed(1);
          if(data.pvVoltage !== undefined) document.getElementById("pvVolts").innerText = data.pvVoltage.toFixed(1);
          if(data.pvPower !== undefined) document.getElementById("pvPower").innerText = data.pvPower.toFixed(1);
          if(data.loadPower !== undefined) document.getElementById("loadPower").innerText = data.loadPower;
          if(data.invTemp !== undefined) document.getElementById("invTemp").innerText = data.invTemp;
        }
      }, (error) => {
        console.error("Firebase read blocked:", error);
      });
    }

    // 4. Logout Logic
    document.getElementById("logoutBtn").onclick = () => {
      firebase.auth().signOut().then(() => {
          dashboard.style.display = "none";
          loginForm.style.display = "block";
      });
    };
  </script>
</body>
</html>
