<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Inverter Telemetry Dashboard</title>
  <style>
    /* Keeping your exact style, just tweaking the cards */
    body { font-family: Arial, sans-serif; text-align: center; background-color: #f9f9f9; padding-bottom: 40px; }
    h1 { margin-top: 30px; font-size: 1.8rem; }
    .card-container { max-width: 1000px; margin: 20px auto; display: flex; flex-wrap: wrap; justify-content: center; }
    .data-card { background: white; padding: 20px; margin: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 220px; }
    .data-card h2 { margin-bottom: 5px; font-size: 1.1rem; color: #555; }
    .data-card p { font-size: 2rem; margin: 10px 0; font-weight: bold; color: #1e88e5; }
    .unit { font-size: 1rem; color: #888; }
  </style>
</head>
<body>

  <h1>Solar & Inverter Dashboard</h1>
  
  <div class="card-container" id="dashboard">
    <div class="data-card"><h2>Battery Voltage</h2><p><span id="battVolts">--</span> <span class="unit">V</span></p></div>
    <div class="data-card"><h2>PV Voltage</h2><p><span id="pvVolts">--</span> <span class="unit">V</span></p></div>
    <div class="data-card"><h2>PV Power</h2><p><span id="pvPower">--</span> <span class="unit">W</span></p></div>
    <div class="data-card"><h2>Load Power</h2><p><span id="loadPower">--</span> <span class="unit">W</span></p></div>
    <div class="data-card"><h2>Inverter Temp</h2><p><span id="invTemp">--</span> <span class="unit">°C</span></p></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

  <script>
    // Your exact Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyBI4avbS3jlosFI_xxuPhkQ6UQPMiqdxRc",
      databaseURL: "https://esp32relay-c5b1a-default-rtdb.asia-southeast1.firebasedatabase.app",
    };
    firebase.initializeApp(firebaseConfig);

    const db = firebase.database();
    const inverterRef = db.ref("/inverter");

    // Listen for real-time updates from the ESP32
    inverterRef.on("value", (snapshot) => {
      const data = snapshot.val();
      if(data) {
        // Update the HTML text elements instantly
        document.getElementById("battVolts").innerText = data.batteryVoltage.toFixed(1);
        document.getElementById("pvVolts").innerText = data.pvVoltage.toFixed(1);
        document.getElementById("pvPower").innerText = data.pvPower.toFixed(1);
        document.getElementById("loadPower").innerText = data.loadPower;
        document.getElementById("invTemp").innerText = data.invTemp;
      }
    });
  </script>
</body>
</html>
